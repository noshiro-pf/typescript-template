name: Sync Agent Config

# Keeps the shared agent instructions up to date: fetches the latest
# agents/AGENTS.md from the common-agent-config repository (no submodule),
# vendors it into agents/common-rules.md, regenerates the root AGENTS.md
# (common part + agents/local-rules.md), and opens a pull request when
# anything changed.

on:
  schedule:
    # Weekly, Monday 06:47 JST (21:47 UTC Sunday).
    - cron: '47 21 * * 0'

  workflow_dispatch:

jobs:
  sync-agent-config:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch shared agent instructions and regenerate AGENTS.md
        run: pnpm run agents:sync

      - name: Create pull request if anything changed
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "Agent config is already up to date."
            exit 0
          fi
          BRANCH="chore/sync-agent-config-$(date -u +%Y%m%d)"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git switch -c "$BRANCH"
          git add agents/common-rules.md AGENTS.md
          git commit -m 'chore: sync common agent config'
          git push -u origin "$BRANCH"
          gh pr create \
            --title 'chore: sync common agent config' \
            --body 'Automated update of the vendored `agents/common-rules.md` and the generated `AGENTS.md`. Created by the sync-agent-config workflow.'
